<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosa Mafia — لعبة المافيا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Amiri:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
    /* ============================================================================
       COSA MAFIA — إصلاح وتوحيد التصميم السينمائي الشامل لجميع الواجهات
       ============================================================================ */

    /* تنسيق عام وضمان الخلفية الداكنة */
    body {
      background-color: #0f0a07 !important;
      color: #e8d9b8 !important;
      font-family: 'Tajawal', sans-serif !important;
      margin: 0;
      padding: 20px;
    }

    /* عناوين اللوحة */
    h1, h2, h3 {
      color: #d9b45c !important;
      text-shadow: 0 0 15px rgba(217,180,92,0.3) !important;
    }

    /* شاشة الاختيار (Chooser) وبوابة الغرفة */
    .chooser-wrap { max-width:560px; margin:60px auto; text-align:center; }
    .chooser-btns { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; margin-top:30px; }
    .chooser-btn {
      flex:1; min-width:210px; padding:28px 22px; border-radius:16px; cursor:pointer;
      font-weight:800; font-size:16px; color: #b5a486 !important;
      background: linear-gradient(160deg, #2a1c14, #140d09) !important;
      border:1px solid #8a6a3377 !important;
      box-shadow: 0 10px 30px #00000099, inset 0 1px 0 #ffffff0d;
      transition: all .25s ease; text-align: center;
    }
    .chooser-btn:hover {
      color: #fffbfa !important; border-color: #d9b45c !important;
      transform: translateY(-4px); box-shadow: 0 15px 35px #000000, 0 0 20px rgba(217,180,92,0.2);
    }

    .room-gate {
      max-width:440px; margin:50px auto; text-align:center;
      background: linear-gradient(170deg, #1f140f, #0d0806) !important;
      border:1px solid #8a6a3366 !important; border-radius:22px; padding:35px 25px;
      box-shadow: 0 24px 60px #000000;
    }

    /* شبكة توزيع الرولات (Role Pool) */
    .role-pool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
      gap: 12px !important;
      margin: 20px 0 !important;
    }

    .role-pool-item {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      background: linear-gradient(160deg, #1a120d, #0d0906) !important;
      border: 1px solid #8a6a3355 !important;
      border-radius: 12px !important;
      padding: 12px 16px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4) !important;
    }

    /* أزرار العدادات (+ / -) */
    .cnt-controls { display: flex; align-items: center; gap: 10px; }
    .cnt-controls button {
      width: 28px !important; height: 28px !important; border-radius: 8px !important;
      border: 1px solid #d9b45c55 !important;
      background: linear-gradient(160deg,#2c1e12,#160f09) !important;
      color: #fffbfa !important; font-weight: bold; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .cnt-controls button:hover { background: #3a2716 !important; border-color: #d9b45c !important; }
    .cnt-controls b { min-width: 20px; text-align: center; color: #fffbfa !important; font-size: 16px; }

    /* إصلاح التشوه في لوحة التحكم (عناصر اليمين والشات المتداخل) */
    #hostGateBody, .control-panel-sidebar, .right-controls-wrap {
      display: flex !important;
      flex-direction: column !important;
      gap: 12px !important;
      max-width: 320px !important;
      margin: 20px 0 20px auto !important; /* محاذاة لليمين لمنع التشوه */
      background: #140d09 !important;
      border: 1px solid #8a6a3344 !important;
      border-radius: 16px !important;
      padding: 20px !important;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6) !important;
    }

    /* توحيد الأزرار العشوائية لتصبح فخمة وسينمائية */
    button, .btn {
      padding: 10px 16px !important;
      border-radius: 8px !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      border: 1px solid #8a6a3377 !important;
      background: linear-gradient(160deg, #2a1c14, #140d09) !important;
      color: #e8d9b8 !important;
      transition: all 0.2s ease !important;
    }
    button:hover, .btn:hover {
      background: #3a2716 !important;
      border-color: #d9b45c !important;
      color: #fffbfa !important;
      box-shadow: 0 0 12px rgba(217,180,92,0.2) !important;
    }

    /* الشات وحقول الإدخال */
    input[type="text"], select, textarea {
      background-color: #00000066 !important;
      border: 1px solid #8a6a3355 !important;
      color: #ffffff !important;
      padding: 10px !important;
      border-radius: 8px !important;
    }

    /* أزرار الوقت */
    .time-btns-wrap, div[style*="flex"] {
      display: flex !important;
      gap: 6px !important;
      justify-content: center !important;
      flex-wrap: wrap !important;
    }

    /* إظهار وإخفاء الشاشات بسلاسة */
    [data-view] { display: none; }
    [data-view].active {
      display: block !important;
      animation: viewFadeIn .45s cubic-bezier(.2,.8,.3,1);
    }
    @keyframes viewFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* استجابة شاشات الجوال */
    @media (max-width: 768px) {
      .chooser-btns { flex-direction: column; }
      .chooser-btn { padding: 24px 16px; }
      .role-pool-grid { grid-template-columns: 1fr !important; }
      #hostGateBody, .control-panel-sidebar, .right-controls-wrap { margin: 20px auto !important; max-width: 100% !important; }
    }
    </style>
</head>
<body style="background-color: #0f0a07; color: #e8d9b8; font-family: 'Tajawal', sans-serif;">

<div class="grain"></div>
<div id="connStatus" class="conn-status bad">⏳ يتصل...</div>

<div data-view="chooser" class="chooser-wrap active">
    <h1 style="color: #d9b45c; text-shadow: 0 0 15px rgba(217,180,92,0.4); margin-bottom: 5px;">👑 لعبة المافيا</h1>
    <div class="subtitle" style="color: #b5a486; font-size: 14px; margin-bottom: 20px;">اختر دورك للبدء</div>
    
    <div class="chooser-btns">
        <div class="chooser-btn" onclick="showView('hostGate')">
            🎙️ أنا الهوست
            <br>
            <span style="display:block; margin-top:8px; font-size:12.5px; opacity:0.8;">أنشئ غرفة جديدة أو ارجع لغرفتك</span>
        </div>
        <div class="chooser-btn" onclick="showView('playerGate')">
            🎮 أنا لاعب
            <br>
            <span style="display:block; margin-top:8px; font-size:12.5px; opacity:0.8;">ادخل بكود الغرفة واسمك</span>
        </div>
    </div>
</div>

<div data-view="hostGate" class="room-gate">
    <h1 style="color: #d9b45c; text-shadow: 0 0 15px rgba(217,180,92,0.4);">🎙️ لوحة الهوست</h1>
    <div id="hostGateBody">
        <button class="btn btn-add" style="width:100%; padding: 14px; border-radius: 12px; border: 1px solid #d9b45c77; background: linear-gradient(160deg, #2c1e12, #160f09); color: #fffbfa; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);" onclick="hostCreateRoom()">
            ➕ إنشاء غرفة جديدة
        </button>
        <div class="hint-text">لو عندك غرفة شغالة من قبل، بيرجعك لها تلقائياً إذا نفس المتصفح</div>
    </div>
</div>

</body>
</html>
